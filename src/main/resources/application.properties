# Twilio credentials — set via env vars (TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN)
# or override in application-local.properties (gitignored) for local dev
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}

# Twilio WhatsApp Sandbox sender number
twilio.whatsapp.from=whatsapp:+14155238886

server.port=8030
logging.level.com.ib.poc=DEBUG

# Media download and local storage
media.storage-path=${MEDIA_STORAGE_PATH:./media-downloads}
