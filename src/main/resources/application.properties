# Twilio credentials — set via env vars (TWILIO_ACCOUNT_SID / TWILIO_AUTH_TOKEN)
# or override in application-local.properties (gitignored) for local dev
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}

# Twilio WhatsApp Sandbox sender number
twilio.whatsapp.from=whatsapp:+14155238886

server.port=8030
logging.level.com.ib.poc=DEBUG

# Media download and local storage
media.storage-path=${MEDIA_STORAGE_PATH:./media-downloads}

# CompanyManager integration (mock @Primary active by default; replace URL for real integration)
company-manager.url=${COMPANY_MANAGER_URL:http://localhost:9998}

# Conversation flow timings
conversation.file-collection-window-ms=3000
conversation.processing-simulation-ms=5000
conversation.session-completed-timeout-ms=20000
